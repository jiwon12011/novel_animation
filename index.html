<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
</head>
<style>
    @font-face {
        font-family: 'HeirofLightRegular';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/HeirofLightRegular.woff') format('woff');
        font-weight: normal;
        font-style: normal;
    }

    @font-face {
        font-family: 'HeirofLightBold';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/HeirofLightBold.woff') format('woff');
        font-weight: normal;
        font-style: normal;
    }

    * {
        margin: 0;
        padding: 0;
    }

    li {
        list-style: none;
    }

    a {
        text-decoration: none;
        color: #fff;
    }

    img {
        vertical-align: top;
    }

    body {
        font-family: 'HeirofLightRegular';
        overflow: hidden;
    }

    .wrap {
        position: relative;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
    }

    /* 시네마틱 비네트 */
    .wrap::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center,
            transparent 50%,
            rgba(0, 0, 0, 0.45) 80%,
            rgba(0, 0, 0, 0.75) 100%);
        z-index: 350;
        pointer-events: none;
    }

    /* 패럴랙스 래퍼 */
    .parallax-layer {
        position: absolute;
        inset: 0;
        will-change: transform;
    }

    .parallax-layer.text-parallax {
        z-index: 400;
    }

    /* ─── 배경 레이어 ─── */
    .bg_box .bg1 .img1 {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        object-fit: cover;
        position: absolute;
        left: 0;
        top: 0;
        transform: scale(1.1); /* 수정: 1.2→1.1, bgani 0%와 일치 */
        will-change: transform, filter;
        animation: bgani 6.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes bgani {
        0%   { transform: scale(1.1); filter: brightness(0.4); }
        100% { transform: scale(1);   filter: brightness(0.9); }
    }

    .bg_box .bg1 .img2 {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        object-fit: cover;
        z-index: 3;
        opacity: 0;
        will-change: transform, opacity, filter;
        animation: forestReveal 2.8s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
    }

    @keyframes forestReveal {
        0% {
            opacity: 0;
            transform: translateY(72px) scale(1.06);
            filter: blur(8px);
        }
        100% {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0);
        }
    }

    .bg_box .bg1 .img3 {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        object-fit: cover;
        z-index: 2;
        opacity: 0;
        transform: translateY(24px) scale(1.05);
        will-change: transform, opacity;
        animation: minicloud 4.8s cubic-bezier(0.22, 1, 0.36, 1) 0.8s forwards,
                   cloudDrift 14s ease-in-out 5.6s infinite alternate;
    }

    @keyframes minicloud {
        0%   { opacity: 0; transform: translateY(24px) scale(1.05); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cloudDrift {
        0%   { transform: translate3d(0, 0, 0) scale(1); }
        50%  { transform: translate3d(8px, -6px, 0) scale(1.01); }
        100% { transform: translate3d(16px, 4px, 0) scale(1); }
    }

    .bg_box .bg1 .img4 {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        object-fit: cover;
        z-index: 1;
        mix-blend-mode: screen;
        opacity: 0;
        filter: brightness(0.5);
        transform: scale(1.26) translate(-8%, 16%);
        will-change: transform, opacity, filter;
        animation: moonRiseCurve 8.5s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards,
                   moonGlow 3.8s ease-in-out 6.8s infinite alternate;
    }

    @keyframes moonRiseCurve {
        0%  { transform: scale(1.26) translate(-8%, 16%); opacity: 0; filter: brightness(0.42); }
        55% { opacity: 0.48; filter: brightness(0.7); }
        100%{ transform: scale(1.26) translate(0%, 5%);  opacity: 0.72; filter: brightness(0.88); }
    }

    @keyframes moonGlow {
        0%   { filter: brightness(0.9)  drop-shadow(0 0 6px rgba(255, 255, 255, 0.12)); }
        100% { filter: brightness(1.02) drop-shadow(0 0 16px rgba(255, 255, 255, 0.28)); }
    }

    /* ─── 별빛 촤르르 (글씨와 함께 좌→우로 번짐) ─── */
    .bg_box .bg1 .starburst {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 0;
        height: 0;
        transform: translate(-50%, -50%) scale(var(--burst-scale, 1));
        z-index: 300;
        pointer-events: none;
        mix-blend-mode: screen;
        will-change: transform;
    }

    .starburst .spark {
        position: absolute;
        left: 0;
        top: 0;
        width: var(--size, 4px);
        height: var(--size, 4px);
        margin: calc(var(--size, 4px) / -2);
        opacity: 0;
        transform: translate(var(--tx), calc(var(--ty) + 18px)) scale(0.2);
        will-change: transform, opacity;
        animation: sparkArrive var(--dur, 0.8s) cubic-bezier(0.22, 1, 0.36, 1) var(--delay, 1.5s) forwards,
                   sparkTwinkle var(--tw, 3.4s) ease-in-out calc(var(--delay, 1.5s) + var(--dur, 0.8s)) infinite alternate;
    }

    /* 별 코어 (둥근 빛망울) — 은은하게 */
    .starburst .spark::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: radial-gradient(circle,
            rgba(255, 252, 235, 0.92) 0%,
            var(--core, rgba(255, 238, 180, 0.8)) 38%,
            var(--halo, rgba(255, 214, 120, 0.3)) 66%,
            rgba(255, 205, 100, 0) 82%);
        box-shadow: 0 0 5px 1px var(--halo, rgba(255, 220, 140, 0.35));
    }

    /* 4갈래 별빛 글린트 (큰 별에만) — 가늘고 옅게 */
    .starburst .spark::before {
        content: '';
        position: absolute;
        left: 50%;
        top: 50%;
        width: calc(var(--size, 4px) * 5.5);
        height: calc(var(--size, 4px) * 5.5);
        transform: translate(-50%, -50%) rotate(var(--rot, 0deg));
        background:
            radial-gradient(closest-side, rgba(255, 244, 198, 0.7), rgba(255, 244, 198, 0) 70%) center / 100% 7% no-repeat,
            radial-gradient(closest-side, rgba(255, 244, 198, 0.7), rgba(255, 244, 198, 0) 70%) center / 7% 100% no-repeat;
        opacity: var(--glint, 0);
        pointer-events: none;
    }

    /* 글자가 등장하는 흐름을 따라 제자리에서 촤르르 켜짐 */
    @keyframes sparkArrive {
        0% {
            opacity: 0;
            transform: translate(var(--tx), calc(var(--ty) + 18px)) scale(0.2);
        }
        50% {
            opacity: var(--end, 0.6);
            transform: translate(var(--tx), calc(var(--ty) - 2px)) scale(1.12);
        }
        100% {
            opacity: var(--end, 0.6);
            transform: translate(var(--tx), var(--ty)) scale(1);
        }
    }

    @keyframes sparkTwinkle {
        0%   { opacity: calc(var(--end, 0.6) * 0.5); transform: translate(var(--tx), var(--ty)) scale(0.95); }
        100% { opacity: var(--end, 0.6);             transform: translate(var(--tx), var(--ty)) scale(1.03); }
    }

    .bg_box .bg1 img {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        object-fit: cover;
    }

    /* ─── 헤더 ─── */
    header {
        position: absolute;
        top: 26px;
        max-width: 1400px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding: 0 clamp(20px, 4vw, 48px);
        gap: clamp(20px, 3vw, 36px);
        box-sizing: border-box;
        z-index: 1000;
        opacity: 0;
        animation: headerFade 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
    }

    @keyframes headerFade {
        0%   { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        100% { opacity: 1; transform: translateX(-50%) translateY(0px); }
    }

    header h1 {
        width: 92px;
        flex-shrink: 0;
    }

    header h1 img {
        width: 100%;
    }

    .menu-toggle {
        display: none;
        min-width: 78px;
        height: 40px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: rgba(12, 24, 40, 0.3);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #f2f5f9;
        font-family: inherit;
        font-size: 14px;
        letter-spacing: 0.06em;
        cursor: pointer;
    }

    header nav {
        margin-left: auto;
    }

    header nav .gnb {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    header nav .gnb li {
        font-size: 17px;
    }

    header nav .gnb li a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 6px 10px;
        color: rgba(240, 242, 246, 0.82);
        text-shadow: 0 0 8px rgba(0, 0, 0, 0.85);
        transition: color 0.3s ease, opacity 0.3s ease;
    }

    header nav .gnb li a:hover {
        color: #fff;
    }

    /* 음악 토글 버튼 */
    .music-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.6);
        background: transparent;
        color: #fff;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s, border-color 0.3s, transform 0.2s;
        flex-shrink: 0;
        outline: none;
    }

    .music-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.92);
        transform: scale(1.04);
    }

    .music-btn.playing {
        border-color: rgba(255, 220, 100, 0.8);
        box-shadow: 0 0 12px rgba(255, 220, 100, 0.4);
    }

    /* ─── 텍스트 ─── */
    .textbox {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 400;
        width: 100%;
        padding: 0 24px;
        box-sizing: border-box;
    }

    .textbox ul {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .textbox li {
        font-size: 72px;
        color: #fff;
        display: flex;
        justify-content: center;
        flex-direction: row;
        letter-spacing: 5px;
    }

    .textbox li span {
        display: block;
        opacity: 0;
        filter: blur(10px);
        animation: appear 2.6s cubic-bezier(0.22, 1, 0.36, 1) var(--char-delay, 1.5s) forwards,
                   textGlow 3.8s cubic-bezier(0.3, 0, 0.2, 1) var(--glow-delay, 4.85s) infinite both;
    }

    .textbox li .mb {
        margin-right: 20px;
    }

    @keyframes appear {
        0% {
            opacity: 0;
            filter: blur(8px);
            transform: translateY(18px) scale(1.04);
            letter-spacing: 12px;
        }
        100% {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0) scale(1);
            letter-spacing: 5px;
        }
    }

    @keyframes textGlow {
        0%,
        18% {
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.18),
                         0 0 14px rgba(255, 255, 255, 0.08);
        }
        42% {
            text-shadow: 0 0 12px rgba(255, 255, 220, 0.55),
                         0 0 28px rgba(255, 240, 170, 0.4),
                         0 0 44px rgba(255, 200,  80, 0.2);
        }
        62% {
            text-shadow: 0 0 16px rgba(255, 250, 220, 0.72),
                         0 0 36px rgba(255, 236, 155, 0.55),
                         0 0 56px rgba(255, 196, 78, 0.28);
        }
        82% {
            text-shadow: 0 0 10px rgba(255, 250, 220, 0.44),
                         0 0 22px rgba(255, 236, 155, 0.24),
                         0 0 36px rgba(255, 196, 78, 0.12);
        }
        100% {
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.18),
                         0 0 14px rgba(255, 255, 255, 0.08);
        }
    }

    /* 글자별 딜레이 (CSS 변수로 통합) */
    .textbox li:nth-child(1) span:nth-child(1) { --char-delay: 1.45s; --glow-delay: 4.82s; }
    .textbox li:nth-child(1) span:nth-child(2) { --char-delay: 1.58s; --glow-delay: 4.92s; }
    .textbox li:nth-child(1) span:nth-child(3) { --char-delay: 1.71s; --glow-delay: 5.02s; }
    .textbox li:nth-child(1) span:nth-child(4) { --char-delay: 1.84s; --glow-delay: 5.12s; }
    .textbox li:nth-child(1) span:nth-child(5) { --char-delay: 1.97s; --glow-delay: 5.22s; }
    .textbox li:nth-child(1) span:nth-child(6) { --char-delay: 2.10s; --glow-delay: 5.32s; }
    .textbox li:nth-child(1) span:nth-child(7) { --char-delay: 2.23s; --glow-delay: 5.42s; }
    .textbox li:nth-child(1) span:nth-child(8) { --char-delay: 2.36s; --glow-delay: 5.52s; }
    .textbox li:nth-child(2) span:nth-child(1) { --char-delay: 2.55s; --glow-delay: 5.72s; }
    .textbox li:nth-child(2) span:nth-child(2) { --char-delay: 2.68s; --glow-delay: 5.82s; }
    .textbox li:nth-child(2) span:nth-child(3) { --char-delay: 2.81s; --glow-delay: 5.92s; }
    .textbox li:nth-child(2) span:nth-child(4) { --char-delay: 2.94s; --glow-delay: 6.02s; }
    .textbox li:nth-child(2) span:nth-child(5) { --char-delay: 3.07s; --glow-delay: 6.12s; }

    /* ─── 별 레이어 ─── */
    .right_box {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 300;
        pointer-events: none;
        overflow: hidden;
        mix-blend-mode: screen;
    }

    .right_box img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        mix-blend-mode: screen;
        opacity: 0;
        will-change: opacity, filter;
    }

    .star1 { animation: shine1 6.5s ease-in-out 4.2s infinite alternate; }
    .star2 { transform: rotate(45deg);  animation: shine2 7.5s ease-in-out 5.1s infinite alternate; }
    .star3 { transform: rotate(90deg);  animation: shine3 8.5s ease-in-out 6.1s infinite alternate; }

    @keyframes shine1 {
        0%   { opacity: 0; }
        100% { opacity: 1; }
    }
    @keyframes shine2 {
        0%   { opacity: 0;   transform: rotate(45deg); }
        100% { opacity: 0.68; transform: rotate(45deg); }
    }
    @keyframes shine3 {
        0%   { filter: brightness(1);   transform: rotate(90deg); opacity: 0; }
        100% { filter: brightness(1.35); transform: rotate(90deg); opacity: 0.92; }
    }

    /* ─── 반딧불 파티클 ─── */
    .particles {
        position: absolute;
        inset: 0;
        z-index: 360;
        pointer-events: none;
        overflow: hidden;
    }

    .particles span {
        position: absolute;
        bottom: -10px;
        border-radius: 50%;
        opacity: 0;
        animation: floatUp var(--dur, 8s) ease-in-out var(--delay, 0s) infinite;
    }

    @keyframes floatUp {
        0%   { opacity: 0;   transform: translate3d(0, 0, 0) scale(1); }
        15%  { opacity: 0.9; }
        85%  { opacity: 0.6; }
        100% { opacity: 0;   transform: translate3d(18px, -100vh, 0) scale(0.4); }
    }

    .particles span:nth-child(1) {
        left: 5%;   width: 3px; height: 3px;
        background: radial-gradient(circle, rgba(255,255,200,1) 0%, rgba(255,220,100,0) 70%);
        box-shadow: 0 0 6px 2px rgba(255,220,100,0.6);
        --dur: 9s; --delay: 3s;
    }
    .particles span:nth-child(2) {
        left: 14%;  width: 2px; height: 2px;
        background: radial-gradient(circle, rgba(255,255,255,1) 0%, transparent 70%);
        box-shadow: 0 0 4px 1px rgba(255,255,255,0.5);
        --dur: 11s; --delay: 5.5s;
    }
    .particles span:nth-child(3) {
        left: 26%;  width: 4px; height: 4px;
        background: radial-gradient(circle, rgba(255,240,180,1) 0%, rgba(255,200,80,0) 70%);
        box-shadow: 0 0 8px 3px rgba(255,200,80,0.5);
        --dur: 13s; --delay: 7s;
    }
    .particles span:nth-child(4) {
        left: 40%;  width: 2px; height: 2px;
        background: radial-gradient(circle, rgba(255,255,255,1) 0%, transparent 70%);
        box-shadow: 0 0 5px 2px rgba(200,220,255,0.6);
        --dur: 8s;  --delay: 4s;
    }
    .particles span:nth-child(5) {
        left: 55%;  width: 3px; height: 3px;
        background: radial-gradient(circle, rgba(255,255,200,1) 0%, transparent 70%);
        box-shadow: 0 0 7px 2px rgba(255,240,100,0.5);
        --dur: 10s; --delay: 2s;
    }
    .particles span:nth-child(6) {
        left: 67%;  width: 2px; height: 2px;
        background: radial-gradient(circle, rgba(255,255,255,1) 0%, transparent 70%);
        box-shadow: 0 0 4px 1px rgba(255,255,255,0.4);
        --dur: 14s; --delay: 6s;
    }
    .particles span:nth-child(7) {
        left: 80%;  width: 3px; height: 3px;
        background: radial-gradient(circle, rgba(255,220,150,1) 0%, transparent 70%);
        box-shadow: 0 0 6px 2px rgba(255,200,100,0.5);
        --dur: 9s;  --delay: 8s;
    }
    .particles span:nth-child(8) {
        left: 91%;  width: 2px; height: 2px;
        background: radial-gradient(circle, rgba(255,255,255,1) 0%, transparent 70%);
        box-shadow: 0 0 5px 2px rgba(180,200,255,0.5);
        --dur: 12s; --delay: 1s;
    }
    .particles span:nth-child(9) {
        left: 9%;   width: 2px; height: 2px;
        background: radial-gradient(circle, rgba(255,255,255,1) 0%, transparent 70%);
        box-shadow: 0 0 4px 1px rgba(200,225,255,0.5);
        --dur: 12.5s; --delay: 9s;
    }
    .particles span:nth-child(10) {
        left: 20%;  width: 5px; height: 5px;
        background: radial-gradient(circle, rgba(255,240,190,0.9) 0%, rgba(255,200,90,0) 70%);
        box-shadow: 0 0 12px 4px rgba(255,210,110,0.35);
        --dur: 15s; --delay: 2.5s;
    }
    .particles span:nth-child(11) {
        left: 33%;  width: 2px; height: 2px;
        background: radial-gradient(circle, rgba(255,255,255,1) 0%, transparent 70%);
        box-shadow: 0 0 5px 2px rgba(255,245,180,0.5);
        --dur: 10.5s; --delay: 6.5s;
    }
    .particles span:nth-child(12) {
        left: 47%;  width: 7px; height: 7px;
        background: radial-gradient(circle, rgba(200,225,255,0.7) 0%, rgba(160,200,255,0) 72%);
        box-shadow: 0 0 16px 6px rgba(170,205,255,0.28);
        --dur: 17s; --delay: 1.5s;
    }
    .particles span:nth-child(13) {
        left: 61%;  width: 3px; height: 3px;
        background: radial-gradient(circle, rgba(255,235,170,1) 0%, transparent 70%);
        box-shadow: 0 0 7px 2px rgba(255,210,110,0.5);
        --dur: 9.5s; --delay: 10s;
    }
    .particles span:nth-child(14) {
        left: 73%;  width: 6px; height: 6px;
        background: radial-gradient(circle, rgba(255,250,210,0.8) 0%, rgba(255,220,120,0) 72%);
        box-shadow: 0 0 14px 5px rgba(255,225,130,0.3);
        --dur: 16s; --delay: 4.5s;
    }
    .particles span:nth-child(15) {
        left: 85%;  width: 2px; height: 2px;
        background: radial-gradient(circle, rgba(255,255,255,1) 0%, transparent 70%);
        box-shadow: 0 0 5px 2px rgba(190,215,255,0.5);
        --dur: 11.5s; --delay: 7.5s;
    }
    .particles span:nth-child(16) {
        left: 96%;  width: 4px; height: 4px;
        background: radial-gradient(circle, rgba(255,240,180,1) 0%, rgba(255,200,80,0) 70%);
        box-shadow: 0 0 9px 3px rgba(255,205,100,0.45);
        --dur: 13.5s; --delay: 3.5s;
    }

    /* ─── 천체 블룸(상단 빛 번짐) ─── */
    .celestial-glow {
        position: absolute;
        left: 50%;
        top: -12%;
        width: 120vw;
        height: 80vh;
        transform: translateX(-50%);
        z-index: 240;
        pointer-events: none;
        background: radial-gradient(ellipse 45% 55% at 50% 42%,
            rgba(150, 195, 255, 0.20) 0%,
            rgba(120, 160, 255, 0.06) 55%,
            transparent 72%);
        mix-blend-mode: screen;
        opacity: 0;
        will-change: opacity, transform;
        animation: glowFade 5s ease 2.4s forwards,
                   glowPulse 8s ease-in-out 7.4s infinite alternate;
    }

    @keyframes glowFade { to { opacity: 1; } }
    @keyframes glowPulse {
        0%   { opacity: 0.7; transform: translateX(-50%) scale(1); }
        100% { opacity: 1;   transform: translateX(-50%) scale(1.08); }
    }

    /* ─── 오로라(빛의 리본) ─── */
    .aurora {
        position: absolute;
        left: -10%;
        right: -10%;
        top: -16%;
        height: 62%;
        z-index: 250;
        pointer-events: none;
        mix-blend-mode: screen;
        opacity: 0;
        filter: blur(58px) saturate(1.3);
        will-change: opacity;
        animation: auroraFade 5s ease 3s forwards;
    }

    .aurora::before,
    .aurora::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: linear-gradient(100deg,
            transparent 10%,
            rgba(110, 230, 200, 0.30) 30%,
            rgba(120, 170, 255, 0.28) 50%,
            rgba(190, 140, 255, 0.26) 70%,
            transparent 90%);
        animation: auroraDrift 19s ease-in-out infinite alternate;
    }

    .aurora::after {
        top: 12%;
        opacity: 0.8;
        background: linear-gradient(80deg,
            transparent 15%,
            rgba(150, 255, 230, 0.22) 40%,
            rgba(170, 200, 255, 0.20) 65%,
            transparent 88%);
        animation-duration: 25s;
        animation-direction: alternate-reverse;
    }

    @keyframes auroraFade { to { opacity: 0.55; } }
    @keyframes auroraDrift {
        0%   { transform: translateX(-8%) skewX(-12deg) scaleY(1); }
        50%  { transform: translateX(6%)  skewX(-6deg)  scaleY(1.15); }
        100% { transform: translateX(-4%) skewX(-14deg) scaleY(0.92); }
    }

    /* ─── 컬러 그레이딩(시네마틱 색감) ─── */
    .color-grade {
        position: absolute;
        inset: 0;
        z-index: 310;
        pointer-events: none;
        background: linear-gradient(180deg,
            rgba(70, 120, 230, 0.12) 0%,
            transparent 38%,
            transparent 66%,
            rgba(255, 180, 95, 0.12) 100%);

    }

    /* ─── 별똥별 ─── */
    .shooting-stars {
        position: absolute;
        inset: 0;
        z-index: 356;
        pointer-events: none;
        overflow: hidden;
    }

    .shooting-star {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.85);

        transform: rotate(-23deg);
        will-change: transform, opacity;
    }

    .shooting-star::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        width: 190px;
        height: 2px;
        transform: translateY(-50%);
        background: linear-gradient(90deg,
            rgba(255, 255, 255, 0.9) 0%,
            rgba(190, 215, 255, 0.35) 45%,
            transparent 100%);
        filter: blur(0.4px);
    }

    .shooting-star:nth-child(1) { left: 68%; top: 8%;  animation: shoot 9s ease-in 6s   infinite; }
    .shooting-star:nth-child(2) { left: 88%; top: 20%; animation: shoot 13s ease-in 12s  infinite; }
    .shooting-star:nth-child(3) { left: 54%; top: 4%;  animation: shoot 16s ease-in 18s  infinite; }

    @keyframes shoot {
        0%   { opacity: 0; transform: translate3d(0, 0, 0) rotate(-23deg); }

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script>
        // ── 마우스 패럴랙스 ──
        const layers = document.querySelectorAll('.parallax-layer');
        let mouseX = 0, mouseY = 0;
        let currentX = 0, currentY = 0;
        let parallaxActive = false;
        const LERP  = 0.07;
        const SHIFT = 30;
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const hasGSAP = typeof window.gsap !== 'undefined' && !reduceMotion;
        const headerEl = document.querySelector('header');
        const logoEl = document.querySelector('header h1');
        const navEl = document.querySelector('header nav');
        const musicBtnEl = document.getElementById('musicBtn');
        const textBox = document.querySelector('.textbox');
        const textLines = document.querySelectorAll('.textbox li');
        const textChars = document.querySelectorAll('.textbox li span');
        const bgSky = document.querySelector('.img1');
        const bgForest = document.querySelector('.img2');
        const bgCloud = document.querySelector('.img3');
        const bgMoon = document.querySelector('.img4');
        const starBurst = document.getElementById('starburst');
        const starLayers = document.querySelectorAll('.right_box img');
        const particleDots = document.querySelectorAll('.particles span');

        // 별빛 촤르르: 글자가 좌→우로 등장하는 흐름을 따라 글씨 위로 번지는 스파클
        function buildStarburst() {
            if (!starBurst) return;
            const COUNT = reduceMotion ? 18 : 40;
            // 노란빛 위주로 따뜻하고 은은하게 (은빛은 살짝만)
            const PALETTES = [
                { core: 'rgba(255, 234, 158, 0.85)', halo: 'rgba(255, 198,  92, 0.32)' }, // 노란빛
                { core: 'rgba(255, 240, 180, 0.85)', halo: 'rgba(255, 210, 110, 0.30)' }, // 옅은 금빛
                { core: 'rgba(255, 246, 206, 0.85)', halo: 'rgba(255, 224, 150, 0.28)' }, // 크림빛
                { core: 'rgba(248, 248, 232, 0.82)', halo: 'rgba(226, 224, 196, 0.26)' }  // 거의 흰빛
            ];
            // 글씨가 차지하는 가로 폭 / 두 줄 세로 폭 (글자 등장 좌표와 맞춤)
            const SPAN_X = 560;   // 좌우 반폭
            const SPAN_Y = 170;   // 상하 반폭
            // 글자 등장 타이밍(첫 글자 1.45s → 마지막 ~3.1s)에 맞춘 좌→우 스윕
            const SWEEP_START = 1.4;
            const SWEEP_SPAN = 1.8;
            let html = '';
            for (let i = 0; i < COUNT; i++) {
                const fx = Math.random();                               // 0(왼쪽) → 1(오른쪽)
                const tx = (fx * 2 - 1) * SPAN_X;
                const ty = (Math.random() * 2 - 1) * SPAN_Y;
                const hero = Math.random() < 0.22;                      // 글린트 별을 줄여 차분하게
                const size = hero ? (4 + Math.random() * 4) : (1.4 + Math.random() * 2.6);
                const end = (hero ? 0.5 : 0.32) + Math.random() * 0.22; // 전체적으로 옅게
                const dur = 0.7 + Math.random() * 0.5;                  // 부드럽게 켜짐
                // x 위치에 비례한 딜레이 → 글씨와 함께 좌에서 우로 은은하게
                const delay = SWEEP_START + fx * SWEEP_SPAN + Math.random() * 0.25;
                const tw = 3.2 + Math.random() * 3;                     // 느릿한 깜빡임
                const pal = PALETTES[(Math.random() * PALETTES.length) | 0];
                const rot = (Math.random() * 90) | 0;
                const glint = hero ? (0.3 + Math.random() * 0.22).toFixed(2) : '0';
                html += '<span class="spark" style="'
                    + '--tx:' + tx.toFixed(1) + 'px;'
                    + '--ty:' + ty.toFixed(1) + 'px;'
                    + '--size:' + size.toFixed(1) + 'px;'
                    + '--end:' + end.toFixed(2) + ';'
                    + '--dur:' + dur.toFixed(2) + 's;'
                    + '--delay:' + delay.toFixed(2) + 's;'
                    + '--tw:' + tw.toFixed(2) + 's;'
                    + '--rot:' + rot + 'deg;'
                    + '--glint:' + glint + ';'
                    + '--core:' + pal.core + ';'
                    + '--halo:' + pal.halo + '"></span>';
            }
            starBurst.innerHTML = html;
        }
        buildStarburst();

        function setupGSAPIntro() {
            if (!hasGSAP) return;

            window.gsap.set(headerEl, { opacity: 1, clearProps: 'animation' });
            window.gsap.set(textChars, { clearProps: 'animation' });
            window.gsap.set(starLayers, { clearProps: 'animation' });
            window.gsap.set(particleDots, { clearProps: 'animation' });
            window.gsap.set([bgSky, bgForest, bgCloud, bgMoon], { clearProps: 'animation' });

            window.gsap.set(headerEl, { autoAlpha: 0, y: -10 });
            window.gsap.set([logoEl, navEl, musicBtnEl], { autoAlpha: 0, y: 10 });
            window.gsap.set(textChars, {
                autoAlpha: 0,
                y: 18,
                scale: 1.04,
                filter: 'blur(8px)',
                letterSpacing: '12px'
            });
            window.gsap.set(starLayers, { autoAlpha: 0 });
            window.gsap.set(particleDots, { autoAlpha: 0 });

            const intro = window.gsap.timeline({ defaults: { ease: 'power3.out' } });
            intro
                .to(headerEl, { autoAlpha: 1, y: 0, duration: 1.1 }, 0.2)
                .to([logoEl, navEl, musicBtnEl], { autoAlpha: 1, y: 0, duration: 0.8, stagger: 0.08 }, 0.35)
                .to(bgSky, { scale: 1, filter: 'brightness(0.9)', duration: 6.5, ease: 'power2.out' }, 0)
                .fromTo(bgForest,
                    { autoAlpha: 0, y: 72, scale: 1.06, filter: 'blur(8px)' },
                    { autoAlpha: 1, y: 0, scale: 1, filter: 'blur(0px)', duration: 2.8 },
                    0.35
                )
                .fromTo(bgCloud,
                    { autoAlpha: 0, y: 24, scale: 1.05 },
                    { autoAlpha: 1, y: 0, scale: 1, duration: 4.8 },
                    0.8
                )
                .fromTo(bgMoon,
                    { autoAlpha: 0, xPercent: -8, yPercent: 16, scale: 1.26, filter: 'brightness(0.42)' },
                    { autoAlpha: 0.72, xPercent: 0, yPercent: 5, scale: 1.26, filter: 'brightness(0.88)', duration: 8.5, ease: 'power2.out' },
                    0.3
                )
                .to(textChars, {
                    autoAlpha: 1,
                    y: 0,
                    scale: 1,
                    filter: 'blur(0px)',
                    letterSpacing: '5px',
                    duration: 1.2,
                    stagger: 0.12
                }, 1.45)
                .to(starLayers, {
                    autoAlpha: (index) => index === 0 ? 1 : index === 1 ? 0.68 : 0.92,
                    duration: 1.4,
                    stagger: 0.2
                }, 4.2)
                .to(particleDots, {
                    autoAlpha: 1,
                    duration: 1,
                    stagger: 0.08
                }, 4.6);

            window.gsap.to(textChars, {
                textShadow: '0 0 16px rgba(255, 250, 220, 0.72), 0 0 36px rgba(255, 236, 155, 0.55), 0 0 56px rgba(255, 196, 78, 0.28)',
                duration: 1.25,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut',
                stagger: {
                    each: 0.1,
                    repeatDelay: 0.2
                },
                delay: 4.8
            });

            window.gsap.to(starLayers, {
                opacity: (index) => index === 0 ? 1 : index === 1 ? 0.68 : 0.92,
                filter: (index) => index === 2 ? 'brightness(1.35)' : 'brightness(1)',
                duration: (index) => 6.5 + index,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut',
                stagger: 0
            });

            window.gsap.to(bgCloud, {
                x: 16,
                y: 4,
                scale: 1.01,
                duration: 14,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut',
                delay: 5.6
            });
        }

        function setupGSAPParallax() {
            if (!hasGSAP || window.matchMedia('(max-width: 960px)').matches) return;

            const moveSkyX = window.gsap.quickTo(bgSky, 'x', { duration: 1.8, ease: 'power3.out' });
            const moveSkyY = window.gsap.quickTo(bgSky, 'y', { duration: 1.8, ease: 'power3.out' });
            const moveForestX = window.gsap.quickTo(bgForest, 'x', { duration: 1.5, ease: 'power3.out' });
            const moveForestY = window.gsap.quickTo(bgForest, 'y', { duration: 1.5, ease: 'power3.out' });
            const moveCloudX = window.gsap.quickTo(bgCloud, 'x', { duration: 2.2, ease: 'power3.out' });
            const moveCloudY = window.gsap.quickTo(bgCloud, 'y', { duration: 2.2, ease: 'power3.out' });
            const moveMoonX = window.gsap.quickTo(bgMoon, 'x', { duration: 2.4, ease: 'power3.out' });
            const moveMoonY = window.gsap.quickTo(bgMoon, 'y', { duration: 2.4, ease: 'power3.out' });
            const moveStarsX = window.gsap.quickTo(starBurst, 'x', { duration: 2, ease: 'power3.out' });
            const moveStarsY = window.gsap.quickTo(starBurst, 'y', { duration: 2, ease: 'power3.out' });

            document.addEventListener('pointermove', (e) => {
                const x = (e.clientX / window.innerWidth) - 0.5;
                const y = (e.clientY / window.innerHeight) - 0.5;
                moveSkyX(x * -12); moveSkyY(y * -10);
                moveForestX(x * -8); moveForestY(y * -6);
                moveCloudX(x * -18); moveCloudY(y * -12);
                moveMoonX(x * 14); moveMoonY(y * 10);
                moveStarsX(x * -14); moveStarsY(y * -10);
            });
        }

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        function lerp(a, b, t) { return a + (b - a) * t; }

        (function tick() {
            if (parallaxActive) {
                currentX = lerp(currentX, mouseX, LERP);
                currentY = lerp(currentY, mouseY, LERP);
                layers.forEach(layer => {
                    const d  = parseFloat(layer.dataset.depth) || 0;
                    const dx = currentX * SHIFT * d;
                    const dy = currentY * SHIFT * d;
                    layer.style.transform = `translate(${dx}px, ${dy}px)`;
                });
            }
            requestAnimationFrame(tick);
        })();

        // 인트로 애니메이션 완료 후 패럴랙스 활성화
        setTimeout(() => { parallaxActive = true; }, 7600);
        setupGSAPIntro();
        setupGSAPParallax();

        // ── 음악 토글 ──
        const header = document.querySelector('header');
        const menuToggle = document.getElementById('menuToggle');
        const mediaQuery = window.matchMedia('(max-width: 720px), (orientation: portrait) and (max-width: 960px)');
        const navLinks = document.querySelectorAll('#mainNav a');
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic  = document.getElementById('bgMusic');
        const STORAGE_KEY_PLAYING = 'bgMusicPlaying';
        const STORAGE_KEY_TIME = 'bgMusicCurrentTime';

        function syncMusicButton() {
            const isPlaying = !bgMusic.paused;
            musicBtn.classList.toggle('playing', isPlaying);
            musicBtn.setAttribute('aria-label', isPlaying ? '음악 정지' : '음악 재생');
        }

        function saveMusicState() {
            sessionStorage.setItem(STORAGE_KEY_PLAYING, String(!bgMusic.paused));
            sessionStorage.setItem(STORAGE_KEY_TIME, String(bgMusic.currentTime || 0));
        }

        const savedTime = Number(sessionStorage.getItem(STORAGE_KEY_TIME) || '0');

        if (savedTime > 0) {
            bgMusic.currentTime = savedTime;
        }

        function syncMobileMenu() {
            if (!mediaQuery.matches) {
                header.classList.remove('menu-open');
                menuToggle.setAttribute('aria-expanded', 'false');
            }
        }

        menuToggle.addEventListener('click', () => {
            if (!mediaQuery.matches) return;
            const isOpen = header.classList.toggle('menu-open');
            menuToggle.setAttribute('aria-expanded', String(isOpen));
        });

        navLinks.forEach((link) => {
            link.addEventListener('click', () => {
                if (!mediaQuery.matches) return;
                saveMusicState();
                header.classList.remove('menu-open');
                menuToggle.setAttribute('aria-expanded', 'false');
            });
        });

        document.addEventListener('click', (event) => {
            if (!mediaQuery.matches || !header.classList.contains('menu-open')) return;
            if (!header.contains(event.target)) {
                header.classList.remove('menu-open');
                menuToggle.setAttribute('aria-expanded', 'false');
            }
        });

        if (typeof mediaQuery.addEventListener === 'function') {
            mediaQuery.addEventListener('change', syncMobileMenu);
        } else if (typeof mediaQuery.addListener === 'function') {
            mediaQuery.addListener(syncMobileMenu);
        }

        musicBtn.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    saveMusicState();
                    syncMusicButton();
                }).catch(() => {
                    syncMusicButton();
                });
            } else {
                bgMusic.pause();
                saveMusicState();
                syncMusicButton();
            }
        });

        bgMusic.addEventListener('play', () => {
            saveMusicState();
            syncMusicButton();
        });

        bgMusic.addEventListener('pause', () => {
            saveMusicState();
            syncMusicButton();
        });

        window.addEventListener('beforeunload', saveMusicState);

        if (sessionStorage.getItem(STORAGE_KEY_PLAYING) === 'true') {
            bgMusic.play().then(() => {
                syncMusicButton();
            }).catch(() => {
                syncMusicButton();
            });
        } else {
            syncMusicButton();
        }
    </script>
</body>

</html>
