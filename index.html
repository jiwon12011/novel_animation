    .textbox {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); 
        text-align: center; z-index: 10; width: 100%;}

    .textbox ul {
        display: flex;
        flex-direction: column; /* 문장을 위아래로 배치 */
        gap: 10px; /* 문장 사이의 수직 간격 */
    }

    .textbox li {
        font-size: 72px; color: #fff; display: flex; justify-content: center; flex-direction: row;
        letter-spacing: 5px; /* 기본 자간 */
    }

    .textbox li span {
        display: block; 
        opacity: 0; /* 처음엔 안 보임 */
        filter: blur(10px); /* 살짝 흐릿하게 시작 (선택 사항) */
        animation: appear 1.5s ease-out forwards; /* 사라락 나타나는 애니메이션 */
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 
                 0 0 20px rgba(255, 255, 255, 0.3);
    }

    .textbox li .mb { margin-right: 20px; } /* 띄어쓰기 간격 */

    /* [2] 사라락 나타나는 효과 (핵심) */
    @keyframes appear {
        0% {
            opacity: 0;
            filter: blur(10px);
            transform: scale(1.1); /* 살짝 커졌다가 제자리로 */
            letter-spacing: 20px; /* 글자 사이가 넓게 시작 */
        }
        100% {
            opacity: 1;
            filter: blur(0);
            transform: scale(1);
            letter-spacing: 5px; /* 원래 간격으로 복귀 */
        }
    }

    /* [3] 글자별 지연 시간 (딜레이) */
    /* 첫 번째 문장 */
    .textbox li:nth-child(1) span:nth-child(1) { animation-delay: 0.1s; }
    .textbox li:nth-child(1) span:nth-child(2) { animation-delay: 0.2s; }
    .textbox li:nth-child(1) span:nth-child(3) { animation-delay: 0.3s; }
    .textbox li:nth-child(1) span:nth-child(4) { animation-delay: 0.4s; }
    .textbox li:nth-child(1) span:nth-child(5) { animation-delay: 0.5s; }
    .textbox li:nth-child(1) span:nth-child(6) { animation-delay: 0.6s; }
    .textbox li:nth-child(1) span:nth-child(7) { animation-delay: 0.7s; }
    .textbox li:nth-child(1) span:nth-child(8) { animation-delay: 0.8s; }

    /* 두 번째 문장 (첫 문장이 거의 다 나온 뒤 시작) */
    .textbox li:nth-child(2) span:nth-child(1) { animation-delay: 1.2s; }
    .textbox li:nth-child(2) span:nth-child(2) { animation-delay: 1.3s; }
    .textbox li:nth-child(2) span:nth-child(3) { animation-delay: 1.4s; }
    .textbox li:nth-child(2) span:nth-child(4) { animation-delay: 1.5s; }
    .textbox li:nth-child(2) span:nth-child(5) { animation-delay: 1.6s; }

    .right_box > div {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url(img/jiwon_star.png);
        background-position: center;
        mix-blend-mode: screen; /* 검은 배경 제거 */
    }

   .right1 {
    opacity: 0.3; mix-blend-mode: screen;
    animation: shine1 4s infinite alternate;
}

 .right2 {
    opacity: 0.5; mix-blend-mode: screen;
    /* 시간을 다르게 하고, 살짝 회전시켜서 이미지가 겹치지 않게 합니다 */
    transform: rotate(45deg) scale(1.1);
    animation: shine2 6s infinite alternate-reverse;
}

 .right3 {
    opacity: 0.2; mix-blend-mode: screen;
    transform: rotate(90deg) scale(1.2);
    animation: shine3 8s infinite linear;
}
    

    @keyframes shine1 {
    0% { opacity: 0.3; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.05); }
}

    @keyframes shine2 {
    0% { opacity: 0.3; transform: rotate(45deg) scale(1.1); }
    100% { opacity: 0.8; transform: rotate(50deg) scale(1.15); }
}

    @keyframes shine3 {
    0% { filter: brightness(1); transform: rotate(90deg) scale(1.2); }
    100% { filter: brightness(1.5); transform: rotate(95deg) scale(1.25); }
}

    @keyframes twinkle {
    0% { opacity: 0.5; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.05); }
}
