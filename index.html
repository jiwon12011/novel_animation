<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
</head>
<style>
    @font-face {
        font-family: 'HeirofLightRegular';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/HeirofLightRegular.woff') format('woff');
        font-weight: normal;
        font-style: normal;
    }

    @font-face {
        font-family: 'HeirofLightBold';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/HeirofLightBold.woff') format('woff');
        font-weight: normal;
        font-style: normal;
    }

    * {
        margin: 0;
        padding: 0;
    }

    li {
        list-style: none;
    }

    a {
        text-decoration: none;
        color: #fff;
    }

    img {
        vertical-align: top;
    }

    body {
        font-family: 'HeirofLightRegular';
        overflow: hidden;
    }

    .wrap {
        position: relative;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
    }

    /* 시네마틱 비네트 */
    .wrap::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center,
            transparent 50%,
            rgba(0, 0, 0, 0.45) 80%,
            rgba(0, 0, 0, 0.75) 100%);
        z-index: 350;
        pointer-events: none;
    }

    /* 패럴랙스 래퍼 */
    .parallax-layer {
        position: absolute;
        inset: 0;
        will-change: transform;
    }

    .parallax-layer.text-parallax {
        z-index: 400;
    }

    /* ─── 배경 레이어 ─── */
    .bg_box .bg1 .img1 {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        object-fit: cover;
        position: absolute;
        left: 0;
        top: 0;
        transform: scale(1.1); /* 수정: 1.2→1.1, bgani 0%와 일치 */
        will-change: transform, filter;
        animation: bgani 6.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes bgani {
        0%   { transform: scale(1.1); filter: brightness(0.4); }
        100% { transform: scale(1);   filter: brightness(0.9); }
    }

    .bg_box .bg1 .img2 {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        object-fit: cover;
        z-index: 3;
        opacity: 0;
        will-change: transform, opacity, filter;
        animation: forestReveal 2.8s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
    }

    @keyframes forestReveal {
        0% {
            opacity: 0;
            transform: translateY(72px) scale(1.06);
            filter: blur(8px);
        }
        100% {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0);
        }
    }

    .bg_box .bg1 .img3 {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        object-fit: cover;
        z-index: 2;
        opacity: 0;
        transform: translateY(24px) scale(1.05);
        will-change: transform, opacity;
        animation: minicloud 4.8s cubic-bezier(0.22, 1, 0.36, 1) 0.8s forwards,
                   cloudDrift 14s ease-in-out 5.6s infinite alternate;
    }

    @keyframes minicloud {
        0%   { opacity: 0; transform: translateY(24px) scale(1.05); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cloudDrift {
        0%   { transform: translate3d(0, 0, 0) scale(1); }
        50%  { transform: translate3d(8px, -6px, 0) scale(1.01); }
        100% { transform: translate3d(16px, 4px, 0) scale(1); }
    }

    .bg_box .bg1 .img4 {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        object-fit: cover;
        z-index: 1;
        mix-blend-mode: screen;
        opacity: 0;
        filter: brightness(0.5);
        transform: scale(1.26) translate(-8%, 16%);
        will-change: transform, opacity, filter;
        animation: moonRiseCurve 8.5s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards,
                   moonGlow 3.8s ease-in-out 6.8s infinite alternate;
    }

    @keyframes moonRiseCurve {
        0%  { transform: scale(1.26) translate(-8%, 16%); opacity: 0; filter: brightness(0.42); }
        55% { opacity: 0.48; filter: brightness(0.7); }
        100%{ transform: scale(1.26) translate(0%, 5%);  opacity: 0.72; filter: brightness(0.88); }
    }

    @keyframes moonGlow {
        0%   { filter: brightness(0.9)  drop-shadow(0 0 6px rgba(255, 255, 255, 0.12)); }
        100% { filter: brightness(1.02) drop-shadow(0 0 16px rgba(255, 255, 255, 0.28)); }
    }

    .bg_box .bg1 .img5 {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(1.03);
        width: 1200px;
        height: auto;
        z-index: 300;
        mix-blend-mode: screen;
        filter: contrast(1.6) brightness(0.62) blur(10px);
        opacity: 0;
        will-change: transform, opacity, filter, mask-position;
        -webkit-mask-image: linear-gradient(90deg,
            transparent 0%,
            rgba(0, 0, 0, 0.08) 12%,
            rgba(0, 0, 0, 0.45) 26%,
            rgba(0, 0, 0, 1) 42%,
            rgba(0, 0, 0, 1) 58%,
            rgba(0, 0, 0, 0.45) 74%,
            rgba(0, 0, 0, 0.08) 88%,
            transparent 100%);
        -webkit-mask-size: 220% 100%;
        -webkit-mask-position: 115% 50%;
        -webkit-mask-repeat: no-repeat;
        mask-image: linear-gradient(90deg,
            transparent 0%,
            rgba(0, 0, 0, 0.08) 12%,
            rgba(0, 0, 0, 0.45) 26%,
            rgba(0, 0, 0, 1) 42%,
            rgba(0, 0, 0, 1) 58%,
            rgba(0, 0, 0, 0.45) 74%,
            rgba(0, 0, 0, 0.08) 88%,
            transparent 100%);
        mask-size: 220% 100%;
        mask-position: 115% 50%;
        mask-repeat: no-repeat;
        animation: starSweep 4.8s cubic-bezier(0.22, 1, 0.36, 1) 2.65s forwards,
                   twinkle 5.5s ease-in-out 7.9s infinite alternate;
    }

    @keyframes starSweep {
        0% {
            opacity: 0;
            transform: translate(-50%, -50%) scale(1.03);
            filter: contrast(1.7) brightness(0.72) blur(10px);
            -webkit-mask-position: 115% 50%;
            mask-position: 115% 50%;
        }
        35% {
            opacity: 0.95;
            filter: contrast(2.1) brightness(1.08) blur(4px);
        }
        65% {
            opacity: 1;
            filter: contrast(2.2) brightness(1.16) blur(1px);
        }
        100% {
            opacity: 0.7;
            transform: translate(-50%, -50%) scale(1);
            filter: contrast(1.45) brightness(0.54) blur(0);
            -webkit-mask-position: 0% 50%;
            mask-position: 0% 50%;
        }
    }

    @-webkit-keyframes starSweep {
        0% {
            opacity: 0;
            transform: translate(-50%, -50%) scale(1.03);
            filter: contrast(1.6) brightness(0.62) blur(10px);
            -webkit-mask-position: 115% 50%;
        }
        35% {
            opacity: 0.95;
            filter: contrast(2.1) brightness(1.08) blur(4px);
        }
        65% {
            opacity: 1;
            filter: contrast(2.2) brightness(1.16) blur(1px);
        }
        100% {
            opacity: 0.7;
            transform: translate(-50%, -50%) scale(1);
            filter: contrast(1.45) brightness(0.54) blur(0);
            -webkit-mask-position: 0% 50%;
        }
    }

    @keyframes twinkle {
        0%   { filter: contrast(2) brightness(0.8); }
        100% { filter: contrast(2) brightness(1.3); }
    }

    .bg_box .bg1 img {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        object-fit: cover;
    }

    /* ─── 헤더 ─── */
    header {
        position: absolute;
        top: 26px;
        max-width: 1400px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding: 0 clamp(20px, 4vw, 48px);
        gap: clamp(20px, 3vw, 36px);
        box-sizing: border-box;
        z-index: 1000;
        opacity: 0;
        animation: headerFade 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
    }

    @keyframes headerFade {
        0%   { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        100% { opacity: 1; transform: translateX(-50%) translateY(0px); }
    }

    header h1 {
        width: 100px;
        flex-shrink: 0;
    }

    header h1 img {
        width: 100%;
    }

    .menu-toggle {
        display: none;
        min-width: 78px;
        height: 40px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: rgba(12, 24, 40, 0.3);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #f2f5f9;
        font-family: inherit;
        font-size: 14px;
        letter-spacing: 0.06em;
        cursor: pointer;
    }

    header nav {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
    }

    header nav .gnb {
        display: flex;
        gap: 8px;
    }

    header nav .gnb li {
        font-size: 22px;
        transition: transform 0.38s cubic-bezier(0.22, 1, 0.36, 1),
                    opacity 0.38s ease,
                    filter 0.38s ease;
        text-shadow: 0 0 5px rgba(0, 0, 0, 1);
    }

    header nav .gnb li a {
        color: #e4e4e4;
        display: flex;
        padding: 10px 30px;
        transition: color 0.38s ease, text-shadow 0.38s ease;
    }

    header nav .gnb:hover li {
        transform: scale(0.94);
        opacity: 0.78;
        filter: saturate(0.85);
    }

    header nav .gnb li:hover {
        transform: scale(1.06) translateY(-1px);
        opacity: 1;
        filter: saturate(1);
    }

    header nav .gnb li:hover a {
        color: #fff;
        text-shadow: 0 0 12px rgba(255, 255, 255, 0.18);
    }

    /* 음악 토글 버튼 */
    .music-btn {
        width: 44px;
        height: 44px;
        margin-right: 6px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.5);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        color: #fff;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s, border-color 0.3s, transform 0.2s;
        flex-shrink: 0;
        outline: none;
    }

    .music-btn:hover {
        background: rgba(255, 255, 255, 0.18);
        border-color: rgba(255, 255, 255, 0.9);
        transform: scale(1.1);
    }

    .music-btn.playing {
        border-color: rgba(255, 220, 100, 0.8);
        box-shadow: 0 0 12px rgba(255, 220, 100, 0.4);
    }

    /* ─── 텍스트 ─── */
    .textbox {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 400;
        width: 100%;
        padding: 0 24px;
        box-sizing: border-box;
    }

    .textbox ul {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .textbox li {
        font-size: 72px;
        color: #fff;
        display: flex;
        justify-content: center;
        flex-direction: row;
        letter-spacing: 5px;
    }

    .textbox li span {
        display: block;
        opacity: 0;
        filter: blur(10px);
        animation: appear 2.6s cubic-bezier(0.22, 1, 0.36, 1) var(--char-delay, 1.5s) forwards,
                   textGlow 3.8s cubic-bezier(0.3, 0, 0.2, 1) var(--glow-delay, 4.85s) infinite both;
    }

    .textbox li .mb {
        margin-right: 20px;
    }

    @keyframes appear {
        0% {
            opacity: 0;
            filter: blur(8px);
            transform: translateY(18px) scale(1.04);
            letter-spacing: 12px;
        }
        100% {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0) scale(1);
            letter-spacing: 5px;
        }
    }

    @keyframes textGlow {
        0%,
        18% {
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.18),
                         0 0 14px rgba(255, 255, 255, 0.08);
        }
        42% {
            text-shadow: 0 0 12px rgba(255, 255, 220, 0.55),
                         0 0 28px rgba(255, 240, 170, 0.4),
                         0 0 44px rgba(255, 200,  80, 0.2);
        }
        62% {
            text-shadow: 0 0 16px rgba(255, 250, 220, 0.72),
                         0 0 36px rgba(255, 236, 155, 0.55),
                         0 0 56px rgba(255, 196, 78, 0.28);
        }
        82% {
            text-shadow: 0 0 10px rgba(255, 250, 220, 0.44),
                         0 0 22px rgba(255, 236, 155, 0.24),
                         0 0 36px rgba(255, 196, 78, 0.12);
        }
        100% {
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.18),
                         0 0 14px rgba(255, 255, 255, 0.08);
        }
    }

    /* 글자별 딜레이 (CSS 변수로 통합) */
    .textbox li:nth-child(1) span:nth-child(1) { --char-delay: 1.45s; --glow-delay: 4.82s; }
    .textbox li:nth-child(1) span:nth-child(2) { --char-delay: 1.58s; --glow-delay: 4.92s; }
    .textbox li:nth-child(1) span:nth-child(3) { --char-delay: 1.71s; --glow-delay: 5.02s; }
    .textbox li:nth-child(1) span:nth-child(4) { --char-delay: 1.84s; --glow-delay: 5.12s; }
    .textbox li:nth-child(1) span:nth-child(5) { --char-delay: 1.97s; --glow-delay: 5.22s; }
    .textbox li:nth-child(1) span:nth-child(6) { --char-delay: 2.10s; --glow-delay: 5.32s; }
    .textbox li:nth-child(1) span:nth-child(7) { --char-delay: 2.23s; --glow-delay: 5.42s; }
    .textbox li:nth-child(1) span:nth-child(8) { --char-delay: 2.36s; --glow-delay: 5.52s; }
    .textbox li:nth-child(2) span:nth-child(1) { --char-delay: 2.55s; --glow-delay: 5.72s; }
    .textbox li:nth-child(2) span:nth-child(2) { --char-delay: 2.68s; --glow-delay: 5.82s; }
    .textbox li:nth-child(2) span:nth-child(3) { --char-delay: 2.81s; --glow-delay: 5.92s; }
    .textbox li:nth-child(2) span:nth-child(4) { --char-delay: 2.94s; --glow-delay: 6.02s; }
    .textbox li:nth-child(2) span:nth-child(5) { --char-delay: 3.07s; --glow-delay: 6.12s; }

    /* ─── 별 레이어 ─── */
    .right_box {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 300;
        pointer-events: none;
        overflow: hidden;
        mix-blend-mode: screen;
    }

    .right_box img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        mix-blend-mode: screen;
        opacity: 0;
        will-change: opacity, filter;
    }

    .star1 { animation: shine1 6.5s ease-in-out 4.2s infinite alternate; }
    .star2 { transform: rotate(45deg);  animation: shine2 7.5s ease-in-out 5.1s infinite alternate; }
    .star3 { transform: rotate(90deg);  animation: shine3 8.5s ease-in-out 6.1s infinite alternate; }

    @keyframes shine1 {
        0%   { opacity: 0; }
        100% { opacity: 1; }
    }
    @keyframes shine2 {
        0%   { opacity: 0;   transform: rotate(45deg); }
        100% { opacity: 0.68; transform: rotate(45deg); }
    }
    @keyframes shine3 {
        0%   { filter: brightness(1);   transform: rotate(90deg); opacity: 0; }
        100% { filter: brightness(1.35); transform: rotate(90deg); opacity: 0.92; }
    }

    /* ─── 반딧불 파티클 ─── */
    .particles {
        position: absolute;
        inset: 0;
        z-index: 360;
        pointer-events: none;
        overflow: hidden;
    }

    .particles span {
        position: absolute;
        bottom: -10px;
        border-radius: 50%;
        opacity: 0;
        animation: floatUp var(--dur, 8s) ease-in-out var(--delay, 0s) infinite;
    }

    @keyframes floatUp {
        0%   { opacity: 0;   transform: translate3d(0, 0, 0) scale(1); }
        15%  { opacity: 0.9; }
        85%  { opacity: 0.6; }
        100% { opacity: 0;   transform: translate3d(18px, -100vh, 0) scale(0.4); }
    }

    .particles span:nth-child(1) {
        left: 5%;   width: 3px; height: 3px;
        background: radial-gradient(circle, rgba(255,255,200,1) 0%, rgba(255,220,100,0) 70%);
        box-shadow: 0 0 6px 2px rgba(255,220,100,0.6);
        --dur: 9s; --delay: 3s;
    }
    .particles span:nth-child(2) {
        left: 14%;  width: 2px; height: 2px;
        background: radial-gradient(circle, rgba(255,255,255,1) 0%, transparent 70%);
        box-shadow: 0 0 4px 1px rgba(255,255,255,0.5);
        --dur: 11s; --delay: 5.5s;
    }
    .particles span:nth-child(3) {
        left: 26%;  width: 4px; height: 4px;
        background: radial-gradient(circle, rgba(255,240,180,1) 0%, rgba(255,200,80,0) 70%);
        box-shadow: 0 0 8px 3px rgba(255,200,80,0.5);
        --dur: 13s; --delay: 7s;
    }
    .particles span:nth-child(4) {
        left: 40%;  width: 2px; height: 2px;
        background: radial-gradient(circle, rgba(255,255,255,1) 0%, transparent 70%);
        box-shadow: 0 0 5px 2px rgba(200,220,255,0.6);
        --dur: 8s;  --delay: 4s;
    }
    .particles span:nth-child(5) {
        left: 55%;  width: 3px; height: 3px;
        background: radial-gradient(circle, rgba(255,255,200,1) 0%, transparent 70%);
        box-shadow: 0 0 7px 2px rgba(255,240,100,0.5);
        --dur: 10s; --delay: 2s;
    }
    .particles span:nth-child(6) {
        left: 67%;  width: 2px; height: 2px;
        background: radial-gradient(circle, rgba(255,255,255,1) 0%, transparent 70%);
        box-shadow: 0 0 4px 1px rgba(255,255,255,0.4);
        --dur: 14s; --delay: 6s;
    }
    .particles span:nth-child(7) {
        left: 80%;  width: 3px; height: 3px;
        background: radial-gradient(circle, rgba(255,220,150,1) 0%, transparent 70%);
        box-shadow: 0 0 6px 2px rgba(255,200,100,0.5);
        --dur: 9s;  --delay: 8s;
    }
    .particles span:nth-child(8) {
        left: 91%;  width: 2px; height: 2px;
        background: radial-gradient(circle, rgba(255,255,255,1) 0%, transparent 70%);
        box-shadow: 0 0 5px 2px rgba(180,200,255,0.5);
        --dur: 12s; --delay: 1s;
    }

    @media (max-width: 960px) {
        header {
            top: 18px;
            padding: 0 18px;
            gap: 14px;
        }

        header h1 {
            width: 82px;
        }

        header nav .gnb li {
            font-size: 18px;
        }

        header nav .gnb li a {
            padding: 8px 14px;
        }

        .music-btn {
            width: 40px;
            height: 40px;
            font-size: 18px;
            margin-right: 0;
        }

        .textbox li {
            font-size: clamp(40px, 8vw, 56px);
            letter-spacing: 3px;
        }

        .textbox li .mb {
            margin-right: 12px;
        }
    }

    @media (max-width: 720px) {
        body {
            overflow: hidden;
        }

        header {
            top: 14px;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            column-gap: 8px;
            row-gap: 12px;
            padding: 0 14px;
        }

        header h1 {
            width: 74px;
            grid-column: 1;
        }

        .menu-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            justify-self: stretch;
            grid-column: 2;
        }

        header nav {
            position: static;
            left: auto;
            top: auto;
            transform: none;
            order: 4;
            grid-column: 1 / -1;
            justify-self: stretch;
            width: 100%;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
            transition: max-height 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                        opacity 0.25s ease,
                        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            transform: translateY(-8px);
        }

        header nav .gnb {
            flex-direction: column;
            gap: 8px;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 20px;
            background: rgba(7, 15, 28, 0.56);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
        }

        header nav .gnb li {
            width: 100%;
            font-size: 15px;
        }

        header nav .gnb li a {
            width: 100%;
            justify-content: center;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
        }

        .music-btn {
            width: 38px;
            height: 38px;
            font-size: 17px;
            grid-column: 3;
            grid-row: 1;
            justify-self: end;
        }

        header.menu-open nav {
            max-height: 320px;
            opacity: 1;
            pointer-events: auto;

<body>
    <div class="wrap">
        <header>
            <h1><img src="img/logo.png" alt=""></h1>
            <button class="menu-toggle" id="menuToggle" aria-expanded="false" aria-controls="mainNav">Menu</button>
            <nav id="mainNav">
                <ul class="gnb">
                    <li><a href="index.html">Prologue</a></li>
                    <li><a href="character.html">Character</a></li>
                    <li><a href="chapters.html">Chapters</a></li>
                    <li><a href="notice.html">Notice</a></li>
                </ul>
            </nav>
            <audio id="bgMusic" src="img/music.mp4" loop></audio>
            <button class="music-btn" id="musicBtn" aria-label="음악 재생" title="음악 재생/정지">♪</button>
        </header>

        <div class="parallax-layer text-parallax" data-depth="0.15">
            <div class="textbox">
                <ul>
                    <li>
                        <span>여</span>
                        <span>름</span>
                        <span>밤</span>
                        <span class="mb">이</span>

                        <span class="mb">써</span>

                        <span>내</span>
                        <span>려</span>
                        <span>간</span>
                    </li>
                    <li>
                        <span>빛</span>
                        <span class="mb">의</span>

                        <span>문</span>
                        <span>장</span>
                        <span>들</span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="bg_box">
            <div class="bg1">
                <div class="parallax-layer" data-depth="0.05">
                    <img src="img/background.png" alt="" class="img1">
                </div>
                <div class="parallax-layer" data-depth="0.1">
                    <img src="img/forest.png" alt="" class="img2">
                </div>
                <div class="parallax-layer" data-depth="0.07">
                    <img src="img/minicloud.png" alt="" class="img3">
                </div>
                <div class="parallax-layer" data-depth="0.3">
                    <img src="img/moon.png" alt="" class="img4">
                </div>
                <img src="img/jiwon_star2.png" alt="" class="img5">
                <div class="right_box">
                    <img src="img/jiwon_star.png" alt="" class="star1">
                    <img src="img/jiwon_star.png" alt="" class="star2">
                    <img src="img/jiwon_star.png" alt="" class="star3">
                </div>
            </div>
        </div>

        <div class="particles">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

    </div>

    <script>
        // ── 마우스 패럴랙스 ──
        const layers = document.querySelectorAll('.parallax-layer');
        let mouseX = 0, mouseY = 0;
        let currentX = 0, currentY = 0;
        let parallaxActive = false;
        const LERP  = 0.07;
        const SHIFT = 30;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        function lerp(a, b, t) { return a + (b - a) * t; }

        (function tick() {
            if (parallaxActive) {
                currentX = lerp(currentX, mouseX, LERP);
                currentY = lerp(currentY, mouseY, LERP);
                layers.forEach(layer => {
                    const d  = parseFloat(layer.dataset.depth) || 0;
                    const dx = currentX * SHIFT * d;
                    const dy = currentY * SHIFT * d;
                    layer.style.transform = `translate(${dx}px, ${dy}px)`;
                });
            }
            requestAnimationFrame(tick);
        })();

        // 인트로 애니메이션 완료 후 패럴랙스 활성화
        setTimeout(() => { parallaxActive = true; }, 7600);

        // ── 음악 토글 ──
        const header = document.querySelector('header');
        const menuToggle = document.getElementById('menuToggle');
        const mediaQuery = window.matchMedia('(max-width: 720px), (orientation: portrait) and (max-width: 960px)');
        const navLinks = document.querySelectorAll('#mainNav a');
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic  = document.getElementById('bgMusic');

        function syncMobileMenu() {
            if (!mediaQuery.matches) {
                header.classList.remove('menu-open');
                menuToggle.setAttribute('aria-expanded', 'false');
            }
        }

        menuToggle.addEventListener('click', () => {
            if (!mediaQuery.matches) return;
            const isOpen = header.classList.toggle('menu-open');
            menuToggle.setAttribute('aria-expanded', String(isOpen));
        });

        navLinks.forEach((link) => {
            link.addEventListener('click', () => {
                if (!mediaQuery.matches) return;
                header.classList.remove('menu-open');
                menuToggle.setAttribute('aria-expanded', 'false');
            });
        });

        document.addEventListener('click', (event) => {
            if (!mediaQuery.matches || !header.classList.contains('menu-open')) return;
            if (!header.contains(event.target)) {
                header.classList.remove('menu-open');
                menuToggle.setAttribute('aria-expanded', 'false');
            }
        });

        if (typeof mediaQuery.addEventListener === 'function') {
            mediaQuery.addEventListener('change', syncMobileMenu);
        } else if (typeof mediaQuery.addListener === 'function') {
            mediaQuery.addListener(syncMobileMenu);
        }

        musicBtn.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
                musicBtn.classList.add('playing');
                musicBtn.setAttribute('aria-label', '음악 정지');
            } else {
                bgMusic.pause();
                musicBtn.classList.remove('playing');
                musicBtn.setAttribute('aria-label', '음악 재생');
            }
        });
    </script>
</body>
