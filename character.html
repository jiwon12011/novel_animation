<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character | 빛의 문장들</title>
    <link rel="stylesheet" href="subpage-theme.css">
    <style>
        .character-shell {
            display: grid;
            gap: 24px;
        }

        .character-head {
            display: flex;
            justify-content: space-between;
            gap: 24px;
            align-items: end;
        }

        .character-head h1 {
            margin: 0;
            font-family: 'HeirofLightBold';
            font-size: clamp(40px, 5.8vw, 76px);
            line-height: 1.04;
        }

        .character-head p {
            max-width: 34ch;
            margin: 0;
            color: rgba(226, 231, 238, 0.78);
            font-family: 'Pretendard', sans-serif;
            font-size: 14px;
            line-height: 1.82;
        }

        .coverflow-stage {
            position: relative;
            min-height: 720px;
            padding: 18px 0 8px;
        }

        .coverflow-track {
            position: relative;
            height: 100%;
            perspective: 1800px;
        }

        .cover-card {
            position: absolute;
            top: 40px;
            left: 50%;
            width: min(72vw, 1180px);
            transform-origin: center center;
            transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.45s ease, filter 0.45s ease;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 32px 90px rgba(0, 0, 0, 0.28);
        }

        .cover-card img {
            width: 100%;
            display: block;
        }

        .cover-card::after {
            content: '';
            position: absolute;
            inset: auto 10% -4% 10%;
            height: 18%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            filter: blur(18px);
            pointer-events: none;
        }

        .cover-card[data-pos="-2"] {
            transform: translateX(-112%) scale(0.68) rotateY(36deg);
            opacity: 0.18;
            filter: blur(2px) brightness(0.72);
            z-index: 1;
        }

        .cover-card[data-pos="-1"] {
            transform: translateX(-82%) scale(0.84) rotateY(26deg);
            opacity: 0.52;
            filter: brightness(0.84);
            z-index: 2;
        }

        .cover-card[data-pos="0"] {
            transform: translateX(-50%) scale(1);
            opacity: 1;
            z-index: 4;
        }

        .cover-card[data-pos="1"] {
            transform: translateX(-18%) scale(0.84) rotateY(-26deg);
            opacity: 0.52;
            filter: brightness(0.84);
            z-index: 2;
        }

        .cover-card[data-pos="2"] {
            transform: translateX(12%) scale(0.68) rotateY(-36deg);
            opacity: 0.18;
            filter: blur(2px) brightness(0.72);
            z-index: 1;
        }

        .cover-arrow {
            position: absolute;
            top: 46%;
            transform: translateY(-50%);
            z-index: 6;
            display: grid;
            place-items: center;
            width: 74px;
            height: 74px;
            padding: 0;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: linear-gradient(180deg, rgba(9, 14, 22, 0.84) 0%, rgba(9, 14, 22, 0.52) 100%);
            color: rgba(252, 248, 240, 0.98);
            font-size: 34px;
            line-height: 1;
            appearance: none;
            -webkit-appearance: none;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24), 0 0 28px rgba(196, 218, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
        }

        .cover-arrow:hover {
            transform: translateY(-50%) scale(1.06);
            border-color: rgba(255, 255, 255, 0.42);
            background: linear-gradient(180deg, rgba(14, 21, 31, 0.94) 0%, rgba(14, 21, 31, 0.66) 100%);
            box-shadow: 0 22px 46px rgba(0, 0, 0, 0.3), 0 0 34px rgba(231, 214, 165, 0.18);
        }

        .cover-arrow:active {
            transform: translateY(-50%) scale(0.98);
        }

        .cover-arrow.prev {
            left: 8px;
        }

        .cover-arrow.next {
            right: 8px;
        }

        .cover-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 8px 10px 0;
        }

        .cover-copy strong {
            display: block;
            font-family: 'HeirofLightBold';
            font-size: 30px;
            line-height: 1.1;
        }

        .cover-copy span {
            color: rgba(226, 231, 238, 0.76);
            font-family: 'Pretendard', sans-serif;
            font-size: 14px;
            line-height: 1.7;
        }

        .cover-controls {
            display: flex;
            gap: 10px;
        }

        .cover-controls button {
            min-width: 132px;
            height: 46px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(7, 11, 17, 0.42);
            color: #f4f2ec;
            font-family: 'Pretendard', sans-serif;
            font-size: 13px;
        }

        .cover-note {
            max-width: 620px;
            margin: 0 auto;
            padding-top: 4px;
            text-align: center;
            color: rgba(226, 231, 238, 0.68);
            font-family: 'Pretendard', sans-serif;
            font-size: 13px;
            line-height: 1.8;
            text-wrap: balance;
        }

        @media (max-width: 720px), (orientation: portrait) and (max-width: 960px) {
            .character-head {
                display: grid;
            }

            .coverflow-stage {
                min-height: 0;
                padding: 0;
            }

            .coverflow-track {
                display: flex;
                flex-direction: column;
                gap: 0;
                perspective: none;
                padding-bottom: 12px;
            }

            .cover-card {
                position: relative;
                top: auto;
                left: auto;
                width: 100%;
                border-radius: 20px;
                transform: none !important;
                opacity: 1 !important;
                filter: none !important;
                z-index: 1 !important;
                margin-top: -72px;
                transition: transform 0.28s ease, opacity 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease, margin 0.28s ease;
            }

            .cover-card:first-child {
                margin-top: 0;
            }

            .cover-card.active-mobile {
                transform: scale(1) !important;
                opacity: 1 !important;
                z-index: 4 !important;
                margin-top: -48px;
                border-color: rgba(255, 255, 255, 0.24);
                box-shadow: 0 24px 56px rgba(0, 0, 0, 0.28);
            }

            .cover-card.active-mobile:first-child {
                margin-top: 0;
            }

            .cover-card[data-mobile-pos="past"] {
                transform: scale(0.88) !important;
                opacity: 0.34 !important;
                margin-top: -108px;
                z-index: 1 !important;
                box-shadow: 0 12px 26px rgba(0, 0, 0, 0.16);
            }

            .cover-card[data-mobile-pos="next-1"] {
                transform: scale(0.96) !important;
                opacity: 0.9 !important;
                margin-top: -62px;
                z-index: 3 !important;
                box-shadow: 0 18px 38px rgba(0, 0, 0, 0.22);
            }

            .cover-card[data-mobile-pos="next-2"] {
                transform: scale(0.93) !important;
                opacity: 0.76 !important;
                margin-top: -72px;
                z-index: 2 !important;
                box-shadow: 0 16px 32px rgba(0, 0, 0, 0.2);
            }

            .cover-card[data-mobile-pos="next-3"] {
                transform: scale(0.9) !important;
                opacity: 0.62 !important;
                margin-top: -82px;
                z-index: 1 !important;
                box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
            }

            .cover-card::after {
                display: none;
            }

            .cover-arrow {
                display: none;
            }

            .cover-copy strong {
                font-size: 24px;
            }

            .cover-controls {
                display: none;
            }

            .cover-info {
                display: grid;
            }
        }
    </style>
</head>
<body>
<div class="subpage">
    <div class="bg-layer bg-sky"><img src="img/background.png" alt=""></div>
    <div class="bg-layer bg-cloud"><img src="img/minicloud.png" alt=""></div>
    <div class="bg-layer bg-moon"><img src="img/moon.png" alt=""></div>
    <div class="bg-layer bg-forest"><img src="img/forest.png" alt=""></div>
    <div class="particle-layer" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span></div>

    <div class="shell">
        <header class="site-header">
            <a class="brand" href="index.html" aria-label="빛의 문장들 홈"><img src="img/logo.png" alt="빛의 문장들"></a>
            <button class="menu-toggle" id="menuToggle" type="button" aria-expanded="false" aria-controls="mainNav">Menu</button>
            <nav class="site-nav" id="mainNav" aria-label="주 메뉴">
                <ul class="gnb">
                    <li><a href="index.html">Prologue</a></li>
                    <li class="active"><a href="character.html">Character</a></li>
                    <li><a href="chapters.html">Chapters</a></li>
                    <li><a href="notice.html">Notice</a></li>
                </ul>
            </nav>
            <button class="music-btn" id="musicBtn" type="button" aria-label="음악 재생">♪</button>
        </header>

        <main class="character-shell">
            <section class="character-head">
                <div>
                    <span class="eyebrow">CHARACTER</span>
                    <h1>등장인물 소개</h1>
                </div>
                <p>달빛 아래 머무는 존재들을 한 장씩 넘겨보며, 이 이야기를 이루는 얼굴들을 천천히 만나보세요.</p>
            </section>

            <section class="coverflow-stage" aria-label="등장인물 카드 슬라이드">
                <button class="cover-arrow prev" id="prevCoverStage" type="button" aria-label="이전 카드">‹</button>
                <button class="cover-arrow next" id="nextCoverStage" type="button" aria-label="다음 카드">›</button>
                <div class="coverflow-track" id="coverflowTrack">
                    <article class="cover-card"><img src="img/cha_card1.png" alt="루나"></article>
                    <article class="cover-card"><img src="img/cha_card2.png" alt="에른"></article>
                    <article class="cover-card"><img src="img/cha_card3.png" alt="노크스"></article>
                    <article class="cover-card"><img src="img/cha_card4.png" alt="모르멜"></article>
                    <article class="cover-card"><img src="img/cha_card5.png" alt="셀레네"></article>
                </div>
            </section>

            <div class="cover-info">
                <div class="cover-copy">
                    <strong id="coverName">루나</strong>
                    <span id="coverDesc">달빛을 모으는 소녀</span>
                </div>
                <div class="cover-controls">
                    <button id="prevCover" type="button" aria-label="이전">이전 캐릭터</button>
                    <button id="nextCover" type="button" aria-label="다음">다음 캐릭터</button>
                </div>
            </div>

            <p class="cover-note">카드를 클릭하거나 좌우 화살표를 눌러 다음 등장인물을 볼 수 있습니다.</p>
        </main>
    </div>
</div>

<script src="subpage.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
<script>
const coverItems = [
  { name: '루나', desc: '달빛을 모으는 소녀' },
  { name: '에른', desc: '반딧불을 다루는 숲의 수호자' },
  { name: '노크스', desc: '그림자를 걷는 기록자' },
  { name: '모르멜', desc: '꿈을 먹는 정령' },
  { name: '셀레네', desc: '달을 바라보는 사서' }
];

const cards = [...document.querySelectorAll('.cover-card')];
const coverName = document.getElementById('coverName');
const coverDesc = document.getElementById('coverDesc');
const heroEyebrow = document.querySelector('.character-head .eyebrow');
const heroTitle = document.querySelector('.character-head h1');
const heroBody = document.querySelector('.character-head p');
const coverStage = document.querySelector('.coverflow-stage');
const coverInfo = document.querySelector('.cover-info');
const coverNote = document.querySelector('.cover-note');
const skyImage = document.querySelector('.bg-sky img');
const cloudImage = document.querySelector('.bg-cloud img');
const moonImage = document.querySelector('.bg-moon img');
const forestImage = document.querySelector('.bg-forest img');
const particleLayer = document.querySelector('.particle-layer');
let coverIndex = 0;
const mobileQuery = window.matchMedia('(max-width: 720px), (orientation: portrait) and (max-width: 960px)');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const hasGSAP = typeof window.gsap !== 'undefined' && !reduceMotion;

function getDesktopState(offset) {
  if (offset === -2) {
    return { xPercent: -112, scale: 0.68, rotateY: 36, opacity: 0.18, filter: 'blur(2px) brightness(0.72)', zIndex: 1 };
  }
  if (offset === -1) {
    return { xPercent: -82, scale: 0.84, rotateY: 26, opacity: 0.52, filter: 'blur(0px) brightness(0.84)', zIndex: 2 };
  }
  if (offset === 0) {
    return { xPercent: -50, scale: 1, rotateY: 0, opacity: 1, filter: 'blur(0px) brightness(1)', zIndex: 4 };
  }
  if (offset === 1) {
    return { xPercent: -18, scale: 0.84, rotateY: -26, opacity: 0.52, filter: 'blur(0px) brightness(0.84)', zIndex: 2 };
  }
  return { xPercent: 12, scale: 0.68, rotateY: -36, opacity: 0.18, filter: 'blur(2px) brightness(0.72)', zIndex: 1 };
}

function getMobileState(card) {
  if (card.classList.contains('active-mobile')) {
    return { scale: 1, y: 0, opacity: 1, filter: 'blur(0px) brightness(1)', zIndex: 4 };
  }
  if (card.dataset.mobilePos === 'past') {
    return { scale: 0.88, y: -18, opacity: 0.34, filter: 'blur(1px) brightness(0.66)', zIndex: 1 };
  }
  if (card.dataset.mobilePos === 'next-1') {
    return { scale: 0.96, y: 6, opacity: 0.9, filter: 'blur(0px) brightness(0.96)', zIndex: 3 };
  }
  if (card.dataset.mobilePos === 'next-2') {
    return { scale: 0.93, y: 12, opacity: 0.76, filter: 'blur(0px) brightness(0.9)', zIndex: 2 };
  }
  return { scale: 0.9, y: 18, opacity: 0.62, filter: 'blur(0px) brightness(0.84)', zIndex: 1 };
}

function animateCoverState() {
  if (!hasGSAP) return;
  cards.forEach((card, idx) => {
    let target;
    if (mobileQuery.matches) {
      target = getMobileState(card);
      window.gsap.set(card, { zIndex: target.zIndex });
      window.gsap.to(card, {
        scale: target.scale,
        y: target.y,
        opacity: target.opacity,
        filter: target.filter,
        duration: 0.52,
        ease: 'power3.out',
        overwrite: 'auto'
      });
      return;
    }

    let offset = idx - coverIndex;
    if (offset > 2) offset -= cards.length;
    if (offset < -2) offset += cards.length;
    target = getDesktopState(Math.max(-2, Math.min(2, offset)));
    window.gsap.set(card, { zIndex: target.zIndex });
    window.gsap.to(card, {
      xPercent: target.xPercent,
      scale: target.scale,
      rotateY: target.rotateY,
      opacity: target.opacity,
      filter: target.filter,
      duration: 0.72,
      ease: 'power3.out',
      overwrite: 'auto'
    });
  });
}

function playIntroMotion() {
  if (!hasGSAP) return;
  window.gsap.set(cards, { transformOrigin: 'center center' });
  const intro = window.gsap.timeline({ defaults: { ease: 'power3.out' } });
  intro
    .from(heroEyebrow, { autoAlpha: 0, y: 20, duration: 0.72 })
    .from(heroTitle, { autoAlpha: 0, y: 32, duration: 0.9 }, '-=0.48')
    .from(heroBody, { autoAlpha: 0, y: 28, duration: 0.82 }, '-=0.58')
    .from(coverStage, { autoAlpha: 0, y: 24, duration: 0.8 }, '-=0.5')
    .from([coverInfo, coverNote], { autoAlpha: 0, y: 18, duration: 0.64, stagger: 0.08 }, '-=0.36');
}

function setupParallax() {
  if (!hasGSAP || mobileQuery.matches) return;

  const moveSkyX = window.gsap.quickTo(skyImage, 'x', { duration: 1.8, ease: 'power3.out' });
  const moveSkyY = window.gsap.quickTo(skyImage, 'y', { duration: 1.8, ease: 'power3.out' });
  const moveCloudX = window.gsap.quickTo(cloudImage, 'x', { duration: 2.2, ease: 'power3.out' });
  const moveCloudY = window.gsap.quickTo(cloudImage, 'y', { duration: 2.2, ease: 'power3.out' });
  const moveMoonX = window.gsap.quickTo(moonImage, 'x', { duration: 2.4, ease: 'power3.out' });
  const moveMoonY = window.gsap.quickTo(moonImage, 'y', { duration: 2.4, ease: 'power3.out' });
  const moveForestX = window.gsap.quickTo(forestImage, 'x', { duration: 1.6, ease: 'power3.out' });
  const moveForestY = window.gsap.quickTo(forestImage, 'y', { duration: 1.6, ease: 'power3.out' });
  const moveParticlesX = window.gsap.quickTo(particleLayer, 'x', { duration: 2.1, ease: 'power3.out' });
  const moveParticlesY = window.gsap.quickTo(particleLayer, 'y', { duration: 2.1, ease: 'power3.out' });

  function resetParallax() {
    moveSkyX(0); moveSkyY(0);
    moveCloudX(0); moveCloudY(0);
    moveMoonX(0); moveMoonY(0);
    moveForestX(0); moveForestY(0);
    moveParticlesX(0); moveParticlesY(0);
  }

  window.addEventListener('pointermove', (event) => {
    const x = (event.clientX / window.innerWidth) - 0.5;
    const y = (event.clientY / window.innerHeight) - 0.5;
    moveSkyX(x * -18); moveSkyY(y * -14);
    moveCloudX(x * -24); moveCloudY(y * -18);
    moveMoonX(x * 16); moveMoonY(y * 14);
    moveForestX(x * -10); moveForestY(y * -7);
    moveParticlesX(x * -22); moveParticlesY(y * -14);
  });

  window.addEventListener('pointerleave', resetParallax);
  resetParallax();
}

function prevCover() {
  coverIndex = (coverIndex - 1 + cards.length) % cards.length;
  renderCoverflow();
}

function nextCover() {
  coverIndex = (coverIndex + 1) % cards.length;
  renderCoverflow();
}

function renderCoverflow() {
  cards.forEach((card, idx) => {
    if (mobileQuery.matches) {
      const mobileOffset = idx - coverIndex;
      card.classList.toggle('active-mobile', idx === coverIndex);
      card.dataset.pos = idx === coverIndex ? '0' : '3';
      if (mobileOffset < 0) {
        card.dataset.mobilePos = 'past';
      } else if (mobileOffset === 0) {
        card.dataset.mobilePos = 'active';
      } else if (mobileOffset === 1) {
        card.dataset.mobilePos = 'next-1';
      } else if (mobileOffset === 2) {
        card.dataset.mobilePos = 'next-2';
      } else {
        card.dataset.mobilePos = 'next-3';
      }
      return;
    }
    card.classList.remove('active-mobile');
    delete card.dataset.mobilePos;
    let offset = idx - coverIndex;
    if (offset > 2) offset -= cards.length;
    if (offset < -2) offset += cards.length;
    card.dataset.pos = String(Math.max(-2, Math.min(2, offset)));
  });
  coverName.textContent = coverItems[coverIndex].name;
  coverDesc.textContent = coverItems[coverIndex].desc;
  animateCoverState();
}

document.getElementById('prevCover').addEventListener('click', prevCover);
document.getElementById('nextCover').addEventListener('click', nextCover);
document.getElementById('prevCoverStage').addEventListener('click', prevCover);
document.getElementById('nextCoverStage').addEventListener('click', nextCover);
cards.forEach((card, idx) => card.addEventListener('click', () => {
  coverIndex = idx;
  renderCoverflow();
}));

document.addEventListener('keydown', (event) => {
  if (event.key === 'ArrowLeft') prevCover();
  if (event.key === 'ArrowRight') nextCover();
});

if (typeof mobileQuery.addEventListener === 'function') {
  mobileQuery.addEventListener('change', () => {
    if (hasGSAP) {
      window.gsap.set(cards, { clearProps: 'xPercent,scale,rotateY,opacity,filter,y' });
      window.gsap.set([skyImage, cloudImage, moonImage, forestImage, particleLayer], { clearProps: 'x,y' });
    }
    renderCoverflow();
  });
} else if (typeof mobileQuery.addListener === 'function') {
  mobileQuery.addListener(renderCoverflow);
}

renderCoverflow();
playIntroMotion();
setupParallax();
</script>
</body>
</html>
